<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jeton Hoxha — Live Sites</title>
  <meta name="description" content="A directory of my live GitHub Pages sites and projects." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #14121f;
      --paper: #fef6e4;
      --paper-2: #fff;
      --muted: #6b6480;
      --line: #14121f;
      --shadow: 6px 6px 0 var(--ink);
      --shadow-lg: 10px 10px 0 var(--ink);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: "Outfit", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--paper);
      min-height: 100vh;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* Animated playful background blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.55;
      z-index: 0;
      pointer-events: none;
      animation: float 18s ease-in-out infinite;
    }
    .blob.b1 { width: 460px; height: 460px; background: #ff5c8a; top: -140px; left: -120px; }
    .blob.b2 { width: 420px; height: 420px; background: #5b8cff; bottom: -160px; right: -120px; animation-delay: -6s; }
    .blob.b3 { width: 340px; height: 340px; background: #ffd23f; top: 40%; right: 10%; animation-delay: -11s; }
    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(40px, -50px) scale(1.1); }
      66% { transform: translate(-30px, 40px) scale(0.95); }
    }
    @media (prefers-reduced-motion: reduce) {
      .blob { animation: none; }
      .card:hover { transform: none !important; }
    }

    .wrap { position: relative; z-index: 1; max-width: 1040px; margin: 0 auto; padding: 72px 24px 64px; }

    /* Header */
    header { margin-bottom: 64px; }
    .eyebrow {
      display: inline-block;
      font-family: "Space Grotesk", sans-serif;
      font-size: 14px; font-weight: 700; letter-spacing: 0.04em;
      background: var(--ink); color: var(--paper);
      padding: 6px 14px; border-radius: 999px;
      transform: rotate(-2deg);
      margin-bottom: 22px;
    }
    h1 {
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(48px, 9vw, 92px);
      font-weight: 700; line-height: 0.95; letter-spacing: -0.03em;
    }
    h1 .pop {
      display: inline-block;
      color: #ff5c8a;
      -webkit-text-stroke: 2px var(--ink);
      transition: transform 0.2s ease;
    }
    h1 .pop:hover { transform: rotate(-4deg) scale(1.05); }
    .sub {
      font-size: clamp(17px, 2.2vw, 21px); color: var(--muted);
      margin-top: 20px; max-width: 540px; font-weight: 500;
    }

    /* Grid */
    .grid {
      display: grid; gap: 24px;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
    }
    .card {
      position: relative;
      display: flex; flex-direction: column;
      background: var(--paper-2);
      border: 3px solid var(--ink);
      border-radius: 20px;
      padding: 26px;
      text-decoration: none;
      color: inherit;
      box-shadow: var(--shadow);
      transition: transform 0.18s cubic-bezier(.34,1.56,.64,1), box-shadow 0.18s ease;
      overflow: hidden;
    }
    .card::before {
      content: "";
      position: absolute; inset: 0;
      background: var(--card-color, #ff5c8a);
      opacity: 0; transition: opacity 0.18s ease;
      z-index: 0;
    }
    .card:hover { transform: translate(-2px, -6px) rotate(var(--tilt, -1deg)); box-shadow: var(--shadow-lg); }
    .card:hover::before { opacity: 0.12; }
    .card:focus-visible { outline: 3px dashed var(--ink); outline-offset: 3px; }
    .card > * { position: relative; z-index: 1; }
    .card-emoji {
      width: 60px; height: 60px; border-radius: 16px;
      background: var(--card-color, #ff5c8a);
      border: 3px solid var(--ink);
      display: flex; align-items: center; justify-content: center;
      font-size: 30px; margin-bottom: 20px;
      transition: transform 0.2s ease;
    }
    .card:hover .card-emoji { transform: rotate(-8deg) scale(1.08); }
    .card-title {
      font-family: "Space Grotesk", sans-serif;
      font-size: 23px; font-weight: 700; letter-spacing: -0.01em;
    }
    .card-desc { font-size: 15px; color: var(--muted); margin-top: 8px; flex: 1; }
    .card-link {
      font-size: 13px; font-weight: 600; color: var(--ink); opacity: 0.6;
      margin-top: 18px; word-break: break-all;
    }
    .card-cta {
      margin-top: 14px;
      font-family: "Space Grotesk", sans-serif;
      font-weight: 700; font-size: 15px;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .card-cta .arrow { transition: transform 0.2s ease; }
    .card:hover .card-cta .arrow { transform: translateX(5px); }

    /* Footer */
    footer {
      margin-top: 72px; padding-top: 28px;
      border-top: 3px solid var(--ink);
      font-size: 15px; font-weight: 500; color: var(--muted);
      display: flex; flex-wrap: wrap; gap: 16px; justify-content: space-between; align-items: center;
    }
    footer a {
      font-family: "Space Grotesk", sans-serif; font-weight: 700;
      color: var(--ink); text-decoration: none;
      border-bottom: 3px solid #ff5c8a;
      transition: background 0.15s ease;
    }
    footer a:hover { background: #ffd23f; }

    @media (max-width: 600px) { .wrap { padding-top: 52px; } }
  </style>
</head>
<body>
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>

  <div class="wrap">
    <header>
      <span class="eyebrow">👋 Jeton Hoxha</span>
      <h1>Stuff I've<br /><span class="pop">shipped</span>.</h1>
      <p class="sub">A directory of my projects deployed on GitHub Pages — poke around and click into anything.</p>
    </header>

    <main class="grid" id="sites">
      <!-- Cards are rendered from the SITES array below so adding a new site is one line. -->
    </main>

    <footer>
      <span>Hosted on GitHub Pages ⚡</span>
      <a href="https://github.com/jchoxha" target="_blank" rel="noopener">github.com/jchoxha →</a>
    </footer>
  </div>

  <script>
    // To add a site: append an entry. emoji & color are optional.
    const SITES = [
      {
        emoji: "🏔️",
        title: "str.rest",
        desc: "Digital guidebooks and direct-booking pages for short-term rental hosts.",
        url: "https://jchoxha.github.io/str-rest/",
        color: "#5b8cff"
      },
      {
        emoji: "🃏",
        title: "Chimera Cards",
        desc: "A card game project.",
        url: "https://jchoxha.github.io/chimera_cards/",
        color: "#ff5c8a"
      },
      {
        emoji: "🌈",
        title: "HappyPrism",
        desc: "An interactive canvas experience.",
        url: "https://jchoxha.github.io/HappyPrism-Canvas/",
        color: "#ffd23f"
      }
    ];

    // Fallback palette + slight random tilt for that hand-placed, playful feel.
    const PALETTE = ["#ff5c8a", "#5b8cff", "#ffd23f", "#3ddc97", "#b06bff", "#ff8c42"];
    const TILTS = ["-1.5deg", "1.2deg", "-1deg", "1.5deg"];

    const grid = document.getElementById("sites");
    grid.innerHTML = SITES.map((s, i) => {
      const color = s.color || PALETTE[i % PALETTE.length];
      const tilt = TILTS[i % TILTS.length];
      return `
      <a class="card" style="--card-color:${color}; --tilt:${tilt};" href="${s.url}" target="_blank" rel="noopener">
        <div class="card-emoji">${s.emoji || "🔗"}</div>
        <div class="card-title">${s.title}</div>
        <div class="card-desc">${s.desc || ""}</div>
        <div class="card-link">${s.url.replace(/^https?:\/\//, "")}</div>
        <div class="card-cta">Visit <span class="arrow">→</span></div>
      </a>`;
    }).join("");
  </script>
</body>
</html>
