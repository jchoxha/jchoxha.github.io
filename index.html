<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jeton Hoxha — Live Sites</title>
  <meta name="description" content="A directory of my live GitHub Pages sites and projects." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    header { margin-bottom: 64px; }
    .eyebrow { margin-bottom: 24px; }
    h1 {
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(46px, 8.5vw, 88px);
      font-weight: 700; line-height: 0.98; letter-spacing: -0.03em;
    }
    .sub {
      font-size: clamp(17px, 2.2vw, 20px); color: var(--muted);
      margin-top: 22px; max-width: 540px; font-weight: 400;
    }
    .grid {
      display: grid; gap: 22px;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
    }
    .card {
      position: relative;
      display: flex; flex-direction: column;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 26px;
      text-decoration: none;
      color: inherit;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      transition: transform 0.25s cubic-bezier(.34,1.4,.5,1), background 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
      overflow: hidden;
    }
    .card::before {
      content: ""; position: absolute; inset: 0; z-index: 0;
      background: radial-gradient(120% 90% at 50% -10%, var(--card-color, #ff5c8a), transparent 60%);
      opacity: 0; transition: opacity 0.3s ease;
    }
    .card:hover {
      transform: translateY(-6px);
      background: var(--card-hover);
      border-color: color-mix(in srgb, var(--card-color, #ff5c8a) 55%, transparent);
      box-shadow: 0 20px 50px -20px color-mix(in srgb, var(--card-color, #ff5c8a) 70%, transparent);
    }
    .card:hover::before { opacity: 0.16; }
    .card:focus-visible { outline: 2px solid var(--card-color, #ff5c8a); outline-offset: 3px; }
    .card > * { position: relative; z-index: 1; }
    .card-emoji {
      width: 58px; height: 58px; border-radius: 16px;
      background: color-mix(in srgb, var(--card-color, #ff5c8a) 18%, transparent);
      border: 1px solid color-mix(in srgb, var(--card-color, #ff5c8a) 40%, transparent);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; margin-bottom: 20px;
      transition: transform 0.25s ease;
    }
    .card:hover .card-emoji { transform: rotate(-8deg) scale(1.1); }
    .card-title {
      font-family: "Space Grotesk", sans-serif;
      font-size: 22px; font-weight: 600; letter-spacing: -0.01em;
    }
    .card-desc { font-size: 15px; color: var(--muted); margin-top: 8px; flex: 1; }
    .card-meta { font-size: 13px; font-weight: 500; color: var(--muted); opacity: 0.7; margin-top: 18px; }
    .card-cta {
      margin-top: 14px;
      font-family: "Space Grotesk", sans-serif;
      font-weight: 600; font-size: 15px;
      color: var(--card-color, #ff5c8a);
      display: inline-flex; align-items: center; gap: 6px;
    }
    .card-cta .arrow { transition: transform 0.25s ease; }
    .card:hover .card-cta .arrow { transform: translateX(5px); }
    @media (max-width: 600px) { .wrap { padding-top: 56px; } }
  </style>
</head>
<body>
  <div class="bg" aria-hidden="true">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
  </div>

  <div class="wrap">
    <header>
      <span class="eyebrow"><span class="dot"></span> Jeton Hoxha · live &amp; shipping</span>
      <h1>Stuff I've<br /><span class="grad">shipped</span>.</h1>
      <p class="sub">A directory of my projects deployed on GitHub Pages — click into any project for its links and source.</p>
    </header>

    <main class="grid" id="sites">
      <!-- Cards are rendered from PROJECTS (projects.js). -->
    </main>

    <footer>
      <span>Hosted on GitHub Pages ⚡</span>
      <a href="https://github.com/jchoxha" target="_blank" rel="noopener">github.com/jchoxha →</a>
    </footer>
  </div>

  <script src="projects.js"></script>
  <script>
    const grid = document.getElementById("sites");
    grid.innerHTML = PROJECTS.map((p, i) => {
      const color = projectColor(p, i);
      const repoCount = 1 + (p.repos ? p.repos.length : 0);
      const meta = repoCount > 1 ? `${repoCount} repos` : "1 repo";
      return `
      <a class="card" style="--card-color:${color};" href="project.html?p=${encodeURIComponent(p.id)}">
        <div class="card-emoji">${p.emoji || "🔗"}</div>
        <div class="card-title">${p.title}</div>
        <div class="card-desc">${p.desc || ""}</div>
        <div class="card-meta">${meta}</div>
        <div class="card-cta">Explore <span class="arrow">→</span></div>
      </a>`;
    }).join("");
  </script>
</body>
</html>
